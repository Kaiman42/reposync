<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 24 24">
  <defs>
    <!-- Filtro para criar a textura de mesh/névoa -->
    <filter id="meshFilter" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
    </filter>

    <!-- Gradiente de base -->
    <linearGradient id="mainMesh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a0000; stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff0000; stop-opacity:1" />
      <stop offset="60%" style="stop-color:#200000; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000; stop-opacity:1" />
    </linearGradient>

    <!-- Máscara para aplicar o efeito apenas ao ícone -->
    <mask id="iconMask">
      <path fill="white" d="M9 19.4q-2.025-.8-3.338-2.512T4.076 13H6.1q.225 1.325.975 2.425T9 17.2zm3.5 2.6q-.625 0-1.062-.437T11 20.5v-6q0-.625.438-1.062T12.5 13h2.2q.375 0 .713.175t.537.5l.55.825h4q.625 0 1.063.438T22 16v4.5q0 .625-.437 1.063T20.5 22zm-9-11q-.625 0-1.062-.437T2 9.5v-6q0-.625.438-1.062T3.5 2h2.2q.375 0 .713.175t.537.5l.55.825h4q.625 0 1.063.438T13 5v4.5q0 .625-.437 1.063T11.5 11zM18 12q0-1.625-.8-3.012T15 6.8V4.6q2.275.925 3.638 2.938T20 12z"/>
    </mask>
  </defs>

  <!-- O fundo que recebe o gradiente e o filtro de ruído/mesh -->
  <rect x="0" y="0" width="24" height="24" fill="url(#mainMesh)" filter="url(#meshFilter)" mask="url(#iconMask)" />
</svg>
